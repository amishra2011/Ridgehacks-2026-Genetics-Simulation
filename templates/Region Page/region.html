{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/region.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

<style>
    /* FORCE GLOBAL FONT */
    * {
        font-family: "Quicksand", sans-serif !important;
    }

    body {
        font-family: "Quicksand", sans-serif !important;
    }

    #map {
        height: 400px;
        width: 100%;
        margin-top: 20px;
        border-radius: 12px;
    }

    #results {
        margin-top: 30px;
    }

    .mutation-card {
        background: #11172a;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        color: white;
    }

    .mutation-card h3 {
        margin: 0 0 8px;
        color: #00ffcc;
        font-family: "Quicksand", sans-serif !important;
    }

    .mutation-card p {
        margin: 4px 0;
        font-size: 14px;
        opacity: 0.85;
        line-height: 1.6;
        font-family: "Quicksand", sans-serif !important;
    }

    .explanation {
        margin-top: 10px;
        padding: 10px;
        background: #1a2340;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.6;
        color: #f3f3f3;
        border-left: 3px solid #00ffcc;
        font-family: "Quicksand", sans-serif !important;
    }

    #loading {
        display: none;
        color: #00ffcc;
        margin-top: 20px;
        font-family: "Quicksand", sans-serif !important;
    }
</style>

<div class="everything">
    <h1>Region</h1>

    <label for="country">Country:</label>
    <input type="text" id="country" placeholder="Enter country"><br><br>

    <label for="state">State:</label>
    <input type="text" id="state" placeholder="Enter state"><br><br>

    <label for="city">City:</label>
    <input type="text" id="city" placeholder="Enter city"><br><br>

    <button onclick="handleSubmit()">Submit</button>

    <div id="map"></div>
    <p id="loading">Loading mutation data...</p>
    <div id="results"></div>
</div>

<script>
    var map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    var marker;

    async function explainMutation(mutationData) {
        const prompt = `You are explaining genetic mutations to a high school student. 
Here is data about a genetic mutation:
- Name: ${mutationData.title}
- Gene: ${mutationData.gene}
- Clinical Significance: ${mutationData.significance}
- Condition: ${mutationData.condition}

Explain in 3-4 simple sentences.`;

        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 300,
                messages: [{ role: 'user', content: prompt }]
            })
        });

        const data = await response.json();
        return data.content[0].text;
    }

    async function handleSubmit() {
        const country = document.getElementById('country').value.trim();
        const state = document.getElementById('state').value.trim();
        const city = document.getElementById('city').value.trim();

        if (!country) {
            alert('Please enter at least a country.');
            return;
        }

        const query = `${city}, ${state}, ${country}`;

        const geoUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
        const geoRes = await fetch(geoUrl);
        const geoData = await geoRes.json();

        if (geoData.length > 0) {
            const lat = parseFloat(geoData[0].lat);
            const lon = parseFloat(geoData[0].lon);

            if (marker) map.removeLayer(marker);

            marker = L.marker([lat, lon]).addTo(map);
            marker.bindPopup(`<b>${query}</b>`).openPopup();

            map.setView([lat, lon], 6);
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';

        const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=clinvar&term=${encodeURIComponent(country)}[geo_location]&retmax=5&retmode=json`;
        const searchRes = await fetch(searchUrl);
        const searchData = await searchRes.json();

        const ids = searchData.esearchresult.idlist;

        if (!ids || ids.length === 0) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('results').innerHTML =
                '<p style="color:white;">No mutation data found for this region.</p>';
            return;
        }

        const summaryUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=clinvar&id=${ids.join(',')}&retmode=json`;
        const summaryRes = await fetch(summaryUrl);
        const summaryData = await summaryRes.json();

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `<h2 style="color:white;">Mutations found in ${country}</h2>`;

        const uids = summaryData.result.uids;

        for (const uid of uids) {
            const item = summaryData.result[uid];

            const mutationData = {
                title: item.title || 'Unknown Mutation',
                gene: item.genes?.map(g => g.symbol).join(', ') || 'N/A',
                significance: item.clinical_significance?.description || 'N/A',
                condition: item.trait_set?.[0]?.trait_name || 'N/A'
            };

            const card = document.createElement('div');
            card.className = 'mutation-card';

            card.innerHTML = `
                <h3>${mutationData.title}</h3>
                <p><b>Gene:</b> ${mutationData.gene}</p>
                <p><b>Clinical Significance:</b> ${mutationData.significance}</p>
                <p><b>Condition:</b> ${mutationData.condition}</p>
                <div class="explanation" id="explanation-${uid}">⏳ Generating...</div>
            `;

            resultsDiv.appendChild(card);

            explainMutation(mutationData).then(explanation => {
                document.getElementById(`explanation-${uid}`).textContent = explanation;
            });
        }

        document.getElementById('loading').style.display = 'none';
    }
</script>

{% endblock %}
