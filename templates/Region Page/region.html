{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/region.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    #map {
        height: 400px;
        width: 100%;
        margin-top: 20px;
        border-radius: 12px;
    }

    #results {
        margin-top: 30px;
    }

    .mutation-card {
        background: #11172a;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        color: white;
    }

    .mutation-card h3 {
        margin: 0 0 8px;
        color: #00ffcc;
    }

    .mutation-card p {
        margin: 4px 0;
        font-size: 14px;
        opacity: 0.85;
        line-height: 1.6;
    }

    .explanation {
        margin-top: 10px;
        padding: 10px;
        background: #1a2340;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.6;
        color: #f3f3f3;
        border-left: 3px solid #00ffcc;
    }

    #loading {
        display: none;
        color: #00ffcc;
        margin-top: 20px;
    }
</style>

<h1>Region</h1>

<label for="country">Country:</label>
<input type="text" id="country" placeholder="Enter country"><br><br>

<label for="state">State:</label>
<input type="text" id="state" placeholder="Enter state"><br><br>

<label for="city">City:</label>
<input type="text" id="city" placeholder="Enter city"><br><br>

<button onclick="handleSubmit()">Submit</button>

<div id="map"></div>
<p id="loading">Loading mutation data...</p>
<div id="results"></div>

<script>
    // ... your existing JS stays exactly the same ...
</script>

{% endblock %}
