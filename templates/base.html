<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RHacks 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d0d;
            --bg2: #151515;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #c8f045;
            --text: #f0ede6;
            --muted: rgba(240, 237, 230, 0.45);
            --font-mono: 'IBM Plex Mono', monospace;
            --font-sans: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            font-family: var(--font-sans);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            height: 56px;
        }

        .brand {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--accent);
            text-transform: uppercase;
            margin-right: 2.5rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 56px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .nav-link.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }
    </style>
</head>

<body>

    <nav>
        <a class="brand" href="{{ url_for('home') }}">RHacks / 2026</a>
        <div class="nav-links">
            <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}"
                href="{{ url_for('home') }}">region</a>
            <a class="nav-link {% if request.endpoint == 'information' %}active{% endif %}"
                href="{{ url_for('information') }}">information</a>
            <a class="nav-link {% if request.endpoint == 'profile' %}active{% endif %}"
                href="{{ url_for('profile') }}">landing</a>
            <a class="nav-link {% if request.endpoint == 'interactive' %}active{% endif %}"
                href="{{ url_for('interactive') }}">interactive</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>

</html>
