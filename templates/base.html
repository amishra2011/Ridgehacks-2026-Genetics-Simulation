<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}RHacks 2026{% endblock %}</title>


    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />


    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }


        :root {
            --bg: #0d0d0d;
            --bg2: #151515;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #c8f045;
            --text: #f0ede6;
            --muted: rgba(240, 237, 230, 0.45);
            --font-mono: 'IBM Plex Mono', monospace;
            --font-sans: 'DM Sans', sans-serif;
        }


        body {
            background: var(--bg);
            font-family: "Quicksand";
            color: var(--text);
            min-height: 100vh;
            font-family: "Quicksand";
        }


        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 64px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }


        .brand {
            font-family: "Quicksand";
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--accent);
            text-transform: uppercase;
            text-decoration: none;
        }


        .nav-links {
            display: flex;
            align-items: center;
            height: 100%;
        }


        .nav-link {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 64px;
            font-family: "Quicksand";
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
        }


        .nav-link:hover {
            color: var(--text);
        }


        .nav-link.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }


        .page-content {
            padding-top: 64px;
        }
    </style>


    {% block head %}{% endblock %}
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
</head>


<body>


    <nav>
        <a class="brand" href="{{ url_for('home') }}">RHacks / 2026</a>


        <div class="nav-links">


            <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}"
                href="{{ url_for('home') }}">Home</a>


            <a class="nav-link {% if request.endpoint == 'region' %}active{% endif %}"
                href="{{ url_for('region') }}">Region</a>


            <a class="nav-link {% if request.endpoint == 'information' %}active{% endif %}"
                href="{{ url_for('information') }}">Information</a>


            <a class="nav-link {% if request.endpoint == 'interactive' %}active{% endif %}"
                href="{{ url_for('interactive') }}">Interactive</a>


        </div>
    </nav>




    <main class="page-content">
        {% block content %}{% endblock %}
    </main>


    {% block scripts %}{% endblock %}
</body>






</html>
