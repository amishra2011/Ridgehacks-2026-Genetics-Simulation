{% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

<style>
    * {
        font-family: "Quicksand", sans-serif !important;
    }

    .auth-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        gap: 16px;
    }

    h1 {
        color: #00ffcc;
        font-size: 32px;
        margin-bottom: 10px;
    }

    .auth-box {
        background: #11172a;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        border: 1px solid rgba(0, 255, 204, 0.15);
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #0b0f1a;
        color: white;
        box-sizing: border-box;
        font-size: 14px;
    }

    button {
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: #00ffcc;
        color: #0b0f1a;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
        transition: 0.2s ease;
        width: 100%;
    }

    button:hover {
        transform: scale(1.02);
    }

    .google-btn {
        background: white;
        color: #0b0f1a;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-decoration: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 15px;
        transition: 0.2s ease;
    }

    .google-btn:hover {
        transform: scale(1.02);
    }

    .divider {
        text-align: center;
        opacity: 0.5;
        font-size: 13px;
    }

    .error {
        color: #ff6b6b;
        font-size: 13px;
        text-align: center;
    }

    .switch {
        text-align: center;
        font-size: 13px;
        opacity: 0.75;
    }

    .switch a {
        color: #00ffcc;
        text-decoration: none;
    }
</style>

<div class="auth-container">
    <h1>Login</h1>
    <div class="auth-box">
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/login">
            <div style="display:flex; flex-direction:column; gap:14px;">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </div>
        </form>

        <div class="divider">or</div>

        <a href="/google-login" class="google-btn">
            <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
        </a>

        <p class="switch">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
</div>

{% endblock %}
